# When a release is created, build the mod and attach the jar to the release.

name: Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: 26.2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Mojang ships Java 25 to end users in 26.1+, so the mod targets Java 25
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Attach jar to release
        working-directory: .
        run: gh release upload "${{ github.event.release.tag_name }}" 26.2/build/libs/*.jar --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
