name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 26.2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The mod targets Java 25 (Mojang ships it in 26.1+), but ModDevGradle runs its
      # NeoForm/asset tooling (e.g. downloadAssets) under Java 21, so both toolchains are needed.
      - name: Set up JDK 21 and 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v6
        with:
          name: xpmagic
          path: 26.2/build/libs/*.jar
