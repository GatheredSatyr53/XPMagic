name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 26.2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Mojang ships Java 25 to end users in 26.1+, so the mod targets Java 25
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v6
        with:
          name: xpmagic
          path: 26.2/build/libs/*.jar
